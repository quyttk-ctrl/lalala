<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quét MSSV Điều Khiển Slide</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --border-color: #cbd5e1;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        /* GIAO DIỆN MẶC ĐỊNH (CÓ Ô NHẬP MÃ) */
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; overflow-x: hidden; }
        .container { width: 100%; max-width: 950px; background: var(--card-bg); padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); text-align: center; margin-bottom: 20px; transition: all 0.3s; }
        h1 { font-size: 24px; margin-bottom: 8px; color: #1e3a8a; }
        p.subtitle { font-size: 14px; color: #64748b; margin-bottom: 20px; }
        
        .input-group { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; max-width: 600px; margin-left: auto; margin-right: auto; }
        input[type="text"] { flex: 1; padding: 12px 16px; font-size: 18px; font-weight: bold; border: 2px solid var(--border-color); border-radius: 8px; text-align: center; outline: none; }
        
        button { padding: 12px 24px; font-size: 16px; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .btn-blue { background-color: var(--primary-color); }
        .btn-blue:hover { background-color: var(--primary-hover); }
        .btn-green { background-color: #16a34a; }
        .btn-green:hover { background-color: #15803d; }

        .error-message { color: #dc2626; font-size: 15px; margin: 10px 0; display: none; font-weight: 500; }
        .info-box { margin-top: 10px; font-size: 15px; color: #16a34a; font-weight: 600; display: none; background-color: #f0fdf4; padding: 10px; border-radius: 6px; border: 1px solid #bbf7d0; }
        
        .slide-container { width: 100%; max-width: 950px; aspect-ratio: 16 / 9; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3); display: none; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        /* NÚT THOÁT TRÌNH CHIẾU */
        #btnExitPresentation { display: none; position: fixed; top: 15px; right: 15px; z-index: 9999; background: rgba(0,0,0,0.6); color: white; padding: 8px 16px; border-radius: 6px; font-size: 13px; border: none; cursor: pointer; }
        #btnExitPresentation:hover { background: rgba(220, 38, 38, 0.8); }

        /* CHẾ ĐỘ TRÌNH CHIẾU TOÀN MÀN HÌNH BẰNG LỆNH CSS */
        body.presentation-mode {
            padding: 0 !important;
            background-color: #000 !important;
            overflow: hidden !important;
        }
        body.presentation-mode .container {
            /* Thay vì display: none, ta dùng opacity và pointer-events để ô input vẫn tồn tại ngầm nhận focus */
            opacity: 0 !important;
            position: absolute !important;
            top: -9999px !important;
            left: -9999px !important;
        }
        body.presentation-mode .slide-container {
            display: block !important;
            width: 100vw !important;
            height: 100vh !important;
            max-width: none !important;
            border-radius: 0 !important;
            box-shadow: none !important;
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            z-index: 8888 !important;
        }
    </style>
</head>
<body>

    <button id="btnExitPresentation" onclick="exitPresentationMode()">❌ Thoát Trình Chiếu (Phím ESC)</button>

    <div class="container">
        <h1>Hệ Thống Điều Khiển Slide Thuyết Trình</h1>
        <p class="subtitle">Quét MSSV từ điện thoại để tự động nhảy trang trên màn hình lớn</p>

        <div class="input-group">
            <input type="text" id="mssvInput" placeholder="Nhập hoặc quét MSSV..." autocomplete="off" autofocus>
            <button class="btn-blue" onclick="loadSlide()">Hiển Thị</button>
            <button class="btn-green" id="btnFullscreen" onclick="enterPresentationMode()" style="display: none;">🖥 Bật Trình Chiếu Lớn</button>
        </div>
        
        <div id="errorMessage" class="error-message">❌ Không tìm thấy slide cho MSSV này!</div>
        <div class="info-box" id="slideInfo">✔ Đang hiển thị slide của SV: <span id="currentMssv"></span></div>
    </div>

    <div class="slide-container" id="slideContainer">
        <iframe id="slideIframe" src="" allowfullscreen="true"></iframe>
    </div>

    <script>
        const PUBLISHED_SLIDE_URL = "https://docs.google.com/presentation/d/e/2PACX-1vRNfL7AfpSo7wysyC0HzIfVmjWGKqHjs2Kbkqxxn-XKlHRDXu4wntuL6btiyu8sfDxAarXGHTs8_6X3/embed";
        
        const mssvMapping = {
            "325008": "id.p",
            "1581248": "id.g3e9ded37a00_0_0",
            "1391414": "id.g3e9ded37a00_0_5"
        };

        // Hàm ép con trỏ luôn luôn nhảy vào ô nhập liệu bất kể chuyện gì xảy ra
        function keepFocus() {
            const inputField = document.getElementById("mssvInput");
            if (document.activeElement !== inputField) {
                inputField.focus();
                inputField.select(); // Tự động bôi đen để quét đè mã mới liên tục
            }
        }

        // Cài đặt vòng lặp kiểm tra liên tục mỗi 0.2 giây để đảm bảo con trỏ không bao giờ bị văng ra ngoài
        setInterval(keepFocus, 200);

        function processMssv(mssv) {
            const errorDiv = document.getElementById("errorMessage");
            const slideContainer = document.getElementById("slideContainer");
            const slideIframe = document.getElementById("slideIframe");
            const slideInfo = document.getElementById("slideInfo");
            const currentMssvSpan = document.getElementById("currentMssv");
            const btnFullscreen = document.getElementById("btnFullscreen");
            const inputField = document.getElementById("mssvInput");

            inputField.value = mssv;

            if (mssvMapping.hasOwnProperty(mssv)) {
                errorDiv.style.display = "none";
                const slidePageId = mssvMapping[mssv];
                const finalEmbedUrl = `${PUBLISHED_SLIDE_URL}?start=false&loop=false&delayms=60000&rm=minimal&slide=${slidePageId}`;

                slideIframe.src = finalEmbedUrl;
                slideContainer.style.display = "block";
                btnFullscreen.style.display = "inline-block"; 
                currentMssvSpan.textContent = mssv;
                slideInfo.style.display = "block";
            } else {
                errorDiv.style.display = "block";
                if(!document.body.classList.contains('presentation-mode')) {
                    slideContainer.style.display = "none";
                    btnFullscreen.style.display = "none";
                    slideInfo.style.display = "none";
                }
            }
            
            // Quét xong tự bôi đen lại ngay lập tức để chờ lượt tiếp theo
            inputField.select();
        }

        function loadSlide() {
            const mssv = document.getElementById("mssvInput").value.trim();
            processMssv(mssv);
        }

        function enterPresentationMode() {
            document.body.classList.add('presentation-mode');
            document.getElementById('btnExitPresentation').style.display = 'block';
            
            // Phóng to trình duyệt
            const docElm = document.documentElement;
            if (docElm.requestFullscreen) docElm.requestFullscreen();
            else if (docElm.webkitRequestFullscreen) docElm.webkitRequestFullscreen();
            
            // Đợi màn hình chuyển đổi xong thì khóa chặt con trỏ chuột vào ô nhập ngầm
            setTimeout(keepFocus, 300);
        }

        function exitPresentationMode() {
            document.body.classList.remove('presentation-mode');
            document.getElementById('btnExitPresentation').style.display = 'none';
            
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            
            setTimeout(keepFocus, 300);
        }

        // Lắng nghe phím ESC để thoát chế độ lớn
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape' || event.keyCode === 27) {
                exitPresentationMode();
            }
        });

        document.getElementById("mssvInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                loadSlide();
            }
        });

        // Click bất cứ đâu trên màn hình (kể cả lúc đang Fullscreen) cũng tự gọi lại con trỏ chuột
        document.addEventListener("click", function() {
            keepFocus();
        });

        function connectBarcodeToPC() {
            const ws = new WebSocket('ws://localhost:57891');
            ws.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    if (data && data.scans && data.scans.length > 0) {
                        const scannedCode = data.scans[0].barcode.trim();
                        processMssv(scannedCode);
                    }
                } catch (e) { }
            };
            ws.onclose = function() {
                setTimeout(connectBarcodeToPC, 5000);
            };
        }

        window.onload = function() {
            connectBarcodeToPC();
            keepFocus();
        };
    </script>
</body>
</html>
